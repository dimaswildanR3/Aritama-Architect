<style>
    /* ===================== */
/* PROJECT SECTION */
/* ===================== */

#project-a {
    background: #f5f5f5 !important;
    padding: 40px 0;
    position: relative;
    z-index: 1;
}

.title {
    text-align: center;
    margin-bottom: 30px;
    font-size: 28px;
}


/* container */

.container {
    max-width: 1200px;
    margin: auto;
    padding: 0 15px;
}


/* grid */

.project-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
}


/* card */

.project-card {
    width: 100%;
    overflow: hidden;
    border-radius: 12px;
    background: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}


/* image */

.project-card img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    display: block;
    transition: 0.3s;
}

.project-card img:hover {
    transform: scale(1.05);
}


/* ===================== */
/* TABLET */
/* ===================== */

@media (max-width: 1024px) {

    .project-grid {
        grid-template-columns: repeat(2, 1fr);
    }

}


/* ===================== */
/* MOBILE */
/* ===================== */

@media (max-width: 600px) {

    .project-grid {
        grid-template-columns: 1fr;
    }

    .project-card img {
        height: auto;
    }

    .title {
        font-size: 22px;
    }

}
</style>
