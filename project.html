<style>

/* =====================
   PROJECT SECTION
   ===================== */

#project-a {
    background: #f4f4f4;
    padding: 60px 0;
}

#project-a .container {
    max-width: 1200px;
    margin: auto;
    padding: 0 20px;
}

#project-a h1 {
    text-align: center;
    margin-bottom: 40px;
}


/* =====================
   PASANGAN (pair)
   Setiap baris = 1 pasang foto
   Kiri  = JPG  landscape 1754×1240 → ratio 1754/1240 = 1.414
   Kanan = PNG  portrait  928×1152  → ratio 928/1152  = 0.806
   ===================== */

.pair {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    align-items: flex-start; /* WAJIB: jangan stretch */
}

/* Lebar proporsional terhadap rasio asli gambar
   Total ratio unit = 1.414 + 0.806 = 2.220
   JPG  = 1.414 / 2.220 ≈ 63.7%
   PNG  = 0.806 / 2.220 ≈ 36.3%
   Pakai fr supaya flex bisa hitung otomatis */

.pair .col-jpg {
    flex: 1754 1 0%;   /* flex-grow setara lebar JPG */
}

.pair .col-png {
    flex: 928 1 0%;    /* flex-grow setara lebar PNG */
}

/* Gambar ikut lebar kolom, tinggi auto = rasio terjaga */
.pair img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 6px;
}

/* Matikan semua efek hover */
.pair img:hover,
.pair .col-jpg:hover,
.pair .col-png:hover {
    transform: none !important;
    transition: none !important;
    box-shadow: none !important;
}


/* =====================
   TABLET  ≤ 768px
   Tetap dua kolom, hanya gap dikecilkan
   ===================== */

@media (max-width: 768px) {
    .pair {
        gap: 12px;
    }
}


/* =====================
   MOBILE  ≤ 540px
   Susun vertikal, JPG dulu lalu PNG
   ===================== */

@media (max-width: 540px) {
    .pair {
        flex-direction: column;
        gap: 12px;
    }

    .pair .col-jpg,
    .pair .col-png {
        flex: none;
        width: 100%;
    }
}


/* =====================
   FLOOR PLAN SECTION (New)
   ===================== */

   #project-b {
    background: #ffffff; /* Warna background beda dikit biar ada pemisah */
    padding: 40px 0 80px 0;
}

.floor-plan-grid {
    display: flex;
    flex-direction: column;
    gap: 40px; /* Jarak antar gambar denah */
}

.floor-plan-item {
    width: 100%;
    border: 1px solid #ddd;
    padding: 10px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.floor-plan-item img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 4px;
}

.floor-plan-title {
    margin-top: 15px;
    font-size: 1.2rem;
    color: #333;
    font-weight: bold;
    text-align: center;
}
</style>
</head>
